<!DOCTYPE html>
<html>

<head>
    <title>Email Confirmed - Treestagram</title>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f0e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(44, 24, 16, 0.1);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #3d5a3e;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: #6b8f71;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            background: #3d5a3e;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2c1810;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">🌳</div>
        <h1>Email Confirmed!</h1>
        <p>Your Treestagram account is now active. You can sign in and start exploring NYC's urban forest.</p>
        <a href="http://localhost:5173/login" class="btn">Sign In to Treestagram</a>
    </div>
    <script>
        // Auto-redirect after 5 seconds
        setTimeout(function () {
            window.location.href = 'http://localhost:5173/login';
        }, 5000);
    </script>
</body>

</html>
