<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete — Treestagram</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bark: #2c1810;
            --moss: #3d5a3e;
            --sage: #6b8f71;
            --leaf: #8fbc8f;
            --canopy: #c5d5c5;
            --cream: #f5f0e8;
            --sun: #d4a853;
            --ink: #1a1108;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--ink);
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(44, 24, 16, 0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-style: italic;
            color: var(--leaf);
            margin-bottom: 2rem;
        }

        .brand span {
            color: var(--sun);
            font-style: normal;
        }

        .success-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--bark);
            margin-bottom: 0.75rem;
        }

        .subtitle {
            color: var(--sage);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.85rem;
            background: var(--moss);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.25s;
        }

        .btn:hover {
            background: var(--bark);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="card">
            <div class="brand">Tree<span>stagram</span></div>
            <span class="success-icon">✅</span>
            <h2>Password reset complete!</h2>
            <p class="subtitle">
                Your password has been set. You can now sign in with your new password.
            </p>
            <a href="/login" class="btn">Sign In</a>
        </div>
    </div>
</body>

</html>
